<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Amnesia WPN</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="min-h-screen bg-[#020205] text-white overflow-x-hidden font-sans px-4">
      <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#ffffff09_1px,transparent_1px),linear-gradient(to_bottom,#ffffff09_1px,transparent_1px)] bg-[size:40px_40px]"></div>
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] bg-blue-400/10 blur-[150px] rounded-full"></div>
      </div>

      <section class="relative z-10 min-h-screen max-w-4xl mx-auto flex items-center justify-center">
        <div class="w-full bg-[#08080a] border border-white/5 rounded-[2.5rem] p-8 md:p-12 text-center">
          <p class="text-[12px] font-black uppercase tracking-[0.4em] text-blue-500 mb-5">Ошибка</p>
          <h1 class="text-6xl md:text-7xl font-black italic uppercase tracking-tighter text-blue-500 mb-5">404</h1>
          <p class="text-gray-400 text-base md:text-lg leading-relaxed max-w-2xl mx-auto mb-10">
            Страница не найдена. Возможно, ссылка устарела или была удалена.
          </p>
          <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="inline-flex items-center justify-center bg-blue-600 px-8 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-500 transition-all">
              На главную
            </a>
            <a href="/tg" class="inline-flex items-center justify-center bg-white/5 border border-white/10 px-8 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-white/10 transition-all">
              Telegram Proxy
            </a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
